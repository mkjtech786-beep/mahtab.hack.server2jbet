<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHTAB AI HACK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0f00 0%, #4a3000 50%, #1a0f00 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.2rem;
            color: #ffd700;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        .header span {
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #d4af37;
            font-size: 0.9rem;
        }

        .card {
            background: rgba(255, 215, 0, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 32px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .start-btn {
            width: 100%;
            padding: 18px 32px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #1a0f00;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 215, 0, 0.6);
        }

        .start-btn svg {
            width: 24px;
            height: 24px;
        }

        .hint {
            text-align: center;
            color: #d4af37;
            margin-top: 16px;
            font-size: 0.85rem;
        }

        .prediction-display {
            display: none;
        }

        .prediction-display.active {
            display: block;
        }

        .time-display {
            display: none;
        }

        .digit-info {
            display: none;
        }

        .prediction-label {
            text-align: center;
            color: #d4af37;
            font-size: 0.85rem;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .prediction-label svg {
            width: 16px;
            height: 16px;
        }

        .prediction-result {
            text-align: center;
            font-size: 4rem;
            font-weight: 900;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 24px;
            transition: all 0.5s ease;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .prediction-result.green {
            background: linear-gradient(135deg, #4ade80, #16a34a);
            color: white;
            box-shadow: 0 10px 40px rgba(74, 222, 128, 0.4);
        }

        .prediction-result.red {
            background: linear-gradient(135deg, #f87171, #dc2626);
            color: white;
            box-shadow: 0 10px 40px rgba(248, 113, 113, 0.4);
        }

        .wait-message {
            text-align: center;
            font-size: 2.5rem;
            font-weight: 900;
            padding: 40px 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #4a3000, #2a1a00);
            color: #ffd700;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 40px rgba(255, 215, 0, 0.2);
            display: none;
        }

        .wait-message.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        .countdown-box {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .countdown-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: #ffd700;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .countdown-header svg {
            width: 16px;
            height: 16px;
        }

        .countdown-time {
            text-align: center;
        }

        .countdown-time .seconds {
            font-size: 2.5rem;
            font-weight: bold;
            color: #ffd700;
        }

        .countdown-time .text {
            color: #d4af37;
            font-size: 0.9rem;
        }

        .progress-bar {
            margin-top: 12px;
            height: 8px;
            background: #3d3000;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ffaa00);
            border-radius: 4px;
            transition: width 1s linear;
        }

        .status {
            text-align: center;
            color: #d4af37;
            font-size: 0.75rem;
            margin-top: 16px;
        }

        .footer {
            text-align: center;
            color: #b8860b;
            font-size: 0.75rem;
            margin-top: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); }
            50% { box-shadow: 0 0 40px rgba(255, 215, 0, 0.6); }
        }

        .glow-effect {
            animation: glow 2s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MAHTAB <span>AI HACK</span></h1>
            <p>NOTE - ALWAYS 3/4 LEVEL MAINTAIN </p>
        </div>

        <div class="card">
            <!-- Start Screen -->
            <div id="startScreen">
                <button class="start-btn glow-effect" onclick="startHack()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    START HACK
                </button>
                <p class="hint">Click to start mahtab hack</p>
            </div>

            <!-- Prediction Display -->
            <div id="predictionDisplay" class="prediction-display">
                <div class="time-display">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    <span class="time" id="currentTime">00:00:00</span>
                </div>

                <div class="digit-info">
                    Minute Last Digit: <span id="lastDigit">-</span>
                </div>

                <div class="prediction-label">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
                        <polyline points="17 6 23 6 23 12"></polyline>
                    </svg>
                    CURRENT PREDICTION
                </div>

                <div class="prediction-result" id="predictionResult">-</div>
                <div class="wait-message" id="waitMessage">WAIT FOR NEXT</div>

                <div class="countdown-box">
                    <div class="countdown-header">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        Next Prediction In
                    </div>
                    <div class="countdown-time">
                        <span class="seconds" id="countdown">60</span>
                        <span class="text">seconds</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill" style="width: 100%"></div>
                    </div>
                </div>

                <div class="status pulse">Mahtab Ai Hack Prediction running...</div>
            </div>
        </div>

        <div class="footer">
            POWERED BY -MAHTAB KHAN JAMALI
        </div>
    </div>

    <script>
        let intervalId = null;
        let countdownId = null;
        let countdown = 60;
        let audioContext = null;
        let hideTimeoutId = null;

        // Initialize audio context
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // Play start sound - futuristic beep sequence
        function playStartSound() {
            initAudio();
            const now = audioContext.currentTime;
            
            // Create multiple oscillators for a rich sound
            const freqs = [523.25, 659.25, 783.99, 1046.50]; // C major arpeggio
            
            freqs.forEach((freq, i) => {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.frequency.value = freq;
                osc.type = 'sine';
                
                gain.gain.setValueAtTime(0, now + i * 0.1);
                gain.gain.linearRampToValueAtTime(0.3, now + i * 0.1 + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
                
                osc.start(now + i * 0.1);
                osc.stop(now + i * 0.1 + 0.3);
            });
        }

        // Play result sound - different for GREEN and RED
        function playResultSound(isGreen) {
            initAudio();
            const now = audioContext.currentTime;
            
            if (isGreen) {
                // GREEN sound - ascending happy chime
                const freqs = [523.25, 659.25, 783.99, 1046.50];
                freqs.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.value = freq;
                    osc.type = 'triangle';
                    
                    gain.gain.setValueAtTime(0, now + i * 0.08);
                    gain.gain.linearRampToValueAtTime(0.25, now + i * 0.08 + 0.03);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.08 + 0.4);
                    
                    osc.start(now + i * 0.08);
                    osc.stop(now + i * 0.08 + 0.4);
                });
            } else {
                // RED sound - descending alert
                const freqs = [880, 698.46, 587.33, 493.88];
                freqs.forEach((freq, i) => {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();
                    
                    osc.connect(gain);
                    gain.connect(audioContext.destination);
                    
                    osc.frequency.value = freq;
                    osc.type = 'sawtooth';
                    
                    gain.gain.setValueAtTime(0, now + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.2, now + i * 0.1 + 0.05);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.35);
                    
                    osc.start(now + i * 0.1);
                    osc.stop(now + i * 0.1 + 0.35);
                });
            }
        }

        // Play countdown warning sound - ticking beeps when few seconds left
        function playCountdownSound(secondsLeft) {
            initAudio();
            const now = audioContext.currentTime;
            
            // Different pitch based on seconds left
            const freq = secondsLeft <= 3 ? 1200 : 800;
            
            const osc = audioContext.createOscillator();
            const gain = audioContext.createGain();
            
            osc.connect(gain);
            gain.connect(audioContext.destination);
            
            osc.frequency.value = freq;
            osc.type = 'square';
            
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(0.15, now + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            
            osc.start(now);
            osc.stop(now + 0.1);
        }

        function getPrediction(minute) {
            const lastDigit = minute % 10;
            // Odd digits = GREEN, Even digits = RED
            const isGreen = [1, 3, 5, 7, 9].includes(lastDigit);
            return { prediction: isGreen ? 'GREEN' : 'RED', lastDigit, isGreen };
        }

        function showResult() {
            const resultEl = document.getElementById('predictionResult');
            const waitEl = document.getElementById('waitMessage');
            
            resultEl.style.display = 'block';
            waitEl.classList.remove('active');
        }

        function hideResult() {
            const resultEl = document.getElementById('predictionResult');
            const waitEl = document.getElementById('waitMessage');
            
            resultEl.style.display = 'none';
            waitEl.classList.add('active');
        }

        function updateDisplay() {
            const now = new Date();
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            const seconds = now.getSeconds().toString().padStart(2, '0');
            
            document.getElementById('currentTime').textContent = `${hours}:${minutes}:${seconds}`;
            
            const { prediction, lastDigit, isGreen } = getPrediction(now.getMinutes());
            document.getElementById('lastDigit').textContent = lastDigit;
            
            const resultEl = document.getElementById('predictionResult');
            resultEl.textContent = prediction;
            resultEl.className = 'prediction-result ' + (prediction === 'GREEN' ? 'green' : 'red');
            
            // Show result
            showResult();
            
            // Play result sound
            playResultSound(isGreen);
            
            // Clear any existing timeout
            if (hideTimeoutId) {
                clearTimeout(hideTimeoutId);
            }
            
            // Hide result after 10 seconds and show "WAIT FOR NEXT"
            hideTimeoutId = setTimeout(() => {
                hideResult();
            }, 10000);
        }

        function updateCountdown() {
            countdown--;
            if (countdown < 0) {
                countdown = 60;
                updateDisplay();
            }
            document.getElementById('countdown').textContent = countdown;
            document.getElementById('progressFill').style.width = (countdown / 60 * 100) + '%';
            
            // Play countdown sound when 5 seconds or less remaining
            if (countdown > 0 && countdown <= 5) {
                playCountdownSound(countdown);
            }
        }

        function startHack() {
            // Play start sound
            playStartSound();
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('predictionDisplay').classList.add('active');
            
            // Initial update
            updateDisplay();
            
            // Sync countdown to next minute
            const now = new Date();
            countdown = 60 - now.getSeconds();
            document.getElementById('countdown').textContent = countdown;
            
            // Update every minute
            intervalId = setInterval(updateDisplay, 60000);
            
            // Countdown every second
            countdownId = setInterval(updateCountdown, 1000);
        }
    </script>
</body>
</html>
